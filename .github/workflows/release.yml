name: Build Release Package

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y php8.3 php8.3-cli php8.3-mbstring php8.3-bcmath php8.3-ctype php8.3-fileinfo php8.3-json php8.3-openssl php8.3-pdo php8.3-pdo-mysql php8.3-tokenizer php8.3-xml php8.3-zip curl
          curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt-get install -y nodejs
          curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
          php -v && composer --version && node -v && npm -v

      - name: Install PHP packages
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction --no-progress

      - name: Install Node packages
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Optimize Laravel
        run: |
          php artisan optimize
          php artisan filament:optimize

      - name: Create release package
        run: |
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          PACKAGE_FILE="ptamaraalmedinatravel-${RELEASE_TAG}.zip"
          
          # Create required directories with .gitkeep
          mkdir -p storage/app/public storage/framework/cache storage/framework/sessions storage/framework/views storage/logs
          touch storage/app/public/.gitkeep storage/framework/cache/.gitkeep storage/framework/sessions/.gitkeep storage/framework/views/.gitkeep storage/logs/.gitkeep
          
          # Create ZIP excluding unnecessary files
          zip -r "$PACKAGE_FILE" . \
            -x "node_modules/*" ".git/*" ".github/*" "tests/*" \
                ".gitignore" ".env*" ".phpactor.json" ".phpunit*" \
                "Homestead.*" "*.log" ".DS_Store" "Thumbs.db" \
                "playwright-report/*" ".vscode/*" ".idea/*" ".cursor/*" "coverage/*"
          
          ls -lh "$PACKAGE_FILE"
          echo "package_file=$PACKAGE_FILE" >> $GITHUB_ENV

      - name: Upload to release
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "${{ env.package_file }}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
